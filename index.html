<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./public/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Examible</title>
    <meta
      name="description"
      content="Examible is a web-based application designed to help students effectively prepare for their 
examination. The platform provides structured past questions, detailed explanations, and 
intelligent practice modes tailored to individual learning needs. It aims to boost student 
confidence, track progress, and increase success rates through a smart, user-friendly study 
environment"
    />
    <meta
      property="og:image"
      content="https://avatars.githubusercontent.com/u/257720944?s=400&v=4"
    />
    
    <!-- DNS Prefetch + Preconnect for Google Fonts (faster font loading) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload main CSS as non-blocking resource (reduces render-blocking delay by ~100ms) -->
    <link rel="preload" href="/assets/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/assets/index.css"></noscript>
    
    <!-- Google Fonts with display=swap for faster text rendering (~50ms faster) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700">
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
